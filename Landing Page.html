<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeHaven — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08070a;
    --gold: #c8a96e;
    --gold-dim: rgba(200,169,110,0.2);
    --cream: #f0ebe0;
    --muted: rgba(240,235,224,0.4);
    --border: rgba(200,169,110,0.18);
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* Animated background */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: drift 18s ease-in-out infinite alternate;
  }

  .orb-1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #c8a96e, transparent);
    top: -200px; left: -100px;
    animation-duration: 20s;
  }

  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #8b6914, transparent);
    bottom: -100px; right: -100px;
    animation-duration: 15s;
    animation-delay: -7s;
  }

  .orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #c8a96e, transparent);
    top: 50%; left: 60%;
    animation-duration: 25s;
    animation-delay: -12s;
    opacity: 0.08;
  }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.1); }
  }

  /* Grid lines */
  .grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(200,169,110,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,169,110,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Grain */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.35;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px 24px;
    max-width: 680px;
    width: 100%;
    animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
  }

  .eyebrow::before,
  .eyebrow::after {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.5rem, 10vw, 7rem);
    font-weight: 300;
    line-height: 1;
    letter-spacing: -1px;
    color: var(--cream);
    margin-bottom: 6px;
    animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }

  h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .tagline {
    font-size: 1rem;
    font-weight: 300;
    color: var(--muted);
    margin-bottom: 52px;
    letter-spacing: 0.3px;
    animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  /* Countdown */
  .countdown {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 52px;
    animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
  }

  .time-block {
    text-align: center;
    position: relative;
    padding: 0 28px;
  }

  .time-block + .time-block::before {
    content: ':';
    position: absolute;
    left: -4px;
    top: 8px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 300;
    color: var(--border);
    line-height: 1;
  }

  .time-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 7vw, 5rem);
    font-weight: 600;
    color: var(--cream);
    line-height: 1;
    display: block;
    min-width: 80px;
    transition: transform 0.15s ease;
  }

  .time-num.flip {
    transform: scaleY(0.8);
    opacity: 0.6;
  }

  .time-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 8px;
    display: block;
  }

  /* Divider line */
  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin-bottom: 40px;
    animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;
  }

  /* Email form */
  .form-wrap {
    animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
  }

  .form-label {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--muted);
    margin-bottom: 16px;
    display: block;
  }

  .form-row {
    display: flex;
    gap: 10px;
    max-width: 420px;
    margin: 0 auto;
  }

  input[type="email"] {
    flex: 1;
    background: rgba(240,235,224,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 13px 18px;
    color: var(--cream);
    font-family: 'Outfit', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border 0.2s, background 0.2s;
  }

  input[type="email"]::placeholder { color: rgba(240,235,224,0.25); }
  input[type="email"]:focus {
    border-color: rgba(200,169,110,0.5);
    background: rgba(240,235,224,0.08);
  }

  .btn-notify {
    background: var(--gold);
    color: #08070a;
    border: none;
    border-radius: 6px;
    padding: 13px 22px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-notify:hover {
    background: #dfc08a;
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(200,169,110,0.3);
  }

  .btn-notify:active { transform: translateY(0); }

  /* Success state */
  .success-msg {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 0.875rem;
    color: var(--gold);
    font-weight: 500;
    margin-top: 4px;
    animation: rise 0.4s ease both;
  }

  .success-msg.show { display: flex; }

  /* Logo */
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 48px;
    display: block;
    animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0s both;
  }

  /* Footer note */
  .footer-note {
    margin-top: 44px;
    font-size: 0.72rem;
    color: rgba(240,235,224,0.2);
    letter-spacing: 0.5px;
    animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
  }
</style>
</head>
<body>

<div class="bg-layer">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid"></div>
<div class="grain"></div>

<div class="content">
  <span class="logo">TradeHaven</span>

  <div class="eyebrow">Something is coming</div>

  <h1>Coming<br><em>Soon.</em></h1>

  <p class="tagline">The marketplace for independent sellers is almost ready.</p>

  <!-- Countdown Timer -->
  <div class="countdown">
    <div class="time-block">
      <span class="time-num" id="days">000</span>
      <span class="time-label">Days</span>
    </div>
    <div class="time-block">
      <span class="time-num" id="hours">00</span>
      <span class="time-label">Hours</span>
    </div>
    <div class="time-block">
      <span class="time-num" id="minutes">00</span>
      <span class="time-label">Minutes</span>
    </div>
    <div class="time-block">
      <span class="time-num" id="seconds">00</span>
      <span class="time-label">Seconds</span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Email Signup -->
  <div class="form-wrap">
    <span class="form-label">Be the first to know when we launch.</span>
    <div class="form-row">
      <input type="email" id="email-input" placeholder="your@email.com">
      <button class="btn-notify" onclick="handleSignup()">Notify Me</button>
    </div>
    <div class="success-msg" id="success-msg">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      You're on the list — we'll be in touch!
    </div>
  </div>

  <p class="footer-note">© 2026 TradeHaven. No spam, ever. Unsubscribe anytime.</p>
</div>

<script>
  // Set launch date to 6 months from today
  const launch = new Date();
  launch.setMonth(launch.getMonth() + 6);
  launch.setHours(0, 0, 0, 0);

  const ids = ['days', 'hours', 'minutes', 'seconds'];
  let prev = {};

  function pad(n, len = 2) {
    return String(n).padStart(len, '0');
  }

  function tick() {
    const now = new Date();
    const diff = Math.max(0, launch - now);

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    const vals = {
      days: pad(d, 3),
      hours: pad(h),
      minutes: pad(m),
      seconds: pad(s)
    };

    ids.forEach(id => {
      const el = document.getElementById(id);
      if (vals[id] !== prev[id]) {
        el.classList.add('flip');
        setTimeout(() => {
          el.textContent = vals[id];
          el.classList.remove('flip');
        }, 75);
      }
    });

    prev = { ...vals };
  }

  tick();
  setInterval(tick, 1000);

  function handleSignup() {
    const input = document.getElementById('email-input');
    const email = input.value.trim();
    const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

    if (!valid) {
      input.style.borderColor = 'rgba(220,80,80,0.6)';
      setTimeout(() => input.style.borderColor = '', 1200);
      return;
    }

    input.parentElement.style.display = 'none';
    document.getElementById('success-msg').classList.add('show');
  }
</script>
</body>
</html>
